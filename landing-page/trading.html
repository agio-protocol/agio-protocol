<html lang="en">
<head>
<meta charset="utf-8">

<title>AGIOTAGE Trading Intelligence — Smart Money, Deployer Tracker, Whale Alerts</title>
<meta name="description" content="Trading intelligence dashboard. Smart money tracker, memecoin deployer alerts, cluster signals, whale watching, options flow, dark pool, and Congress trades.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080d;
  --card:#0c1018;
  --card-hover:#111827;
  --border:#1a2030;
  --text:#e0e6ef;
  --muted:#7a8599;
  --accent:#00d9a3;
  --red:#ef4444;
  --yellow:#f59e0b;
  --purple:#8b5cf6;
  --blue:#3b82f6;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
.page{max-width:1100px;margin:0 auto;padding:20px 24px}
h1{font-size:24px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:24px}
.live-dot{width:8px;height:8px;border-radius:50%;background:#10b981;display:inline-block;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Bot Performance Banner */
.bot-banner{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:24px}
.bot-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative}
.bot-card:hover{border-color:#374151}
.bot-card-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.bot-card-stats{display:flex;gap:16px;font-size:12px}
.bot-stat-val{font-size:18px;font-weight:700}
.bot-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.bot-badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700}
.trading-status-badge{position:absolute;top:12px;right:12px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700}

/* Search */
.search-wrap{margin-bottom:20px}
.search-box{display:flex;align-items:center;background:var(--card);border:2px solid var(--border);border-radius:10px;padding:4px;transition:border-color .2s}
.search-box:focus-within{border-color:var(--accent)}
.search-icon{padding:0 12px;color:var(--muted);font-size:16px}
.search-input{flex:1;padding:12px 0;background:transparent;border:none;color:var(--text);font-size:15px;font-weight:500;outline:none;font-family:inherit}
.search-btn{padding:10px 24px;background:var(--accent);color:var(--bg);border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin:2px}
.scan-btn{padding:10px 18px;background:#1f2937;border:1px solid #374151;color:var(--accent);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin:2px;white-space:nowrap}

/* Section Nav */
.section-nav{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.section-btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s}
.section-btn:hover{border-color:#374151;color:var(--text)}
.section-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}

/* Stats Row */
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;flex:1;min-width:120px}
.stat-val{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:6px 6px 0 0;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);background:transparent;border:none;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);background:#00d9a308;border-bottom:2px solid var(--accent)}

/* Coin Selector */
.coin-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;max-height:80px;overflow-y:auto}
.coin-btn{padding:4px 10px;font-size:10px;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--muted);border-radius:6px;cursor:pointer;transition:all .15s;font-family:inherit}
.coin-btn:hover{border-color:#374151;color:var(--text)}
.coin-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}

/* Score Ring */
.score-ring{width:64px;height:64px;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--score) * 1%),var(--border) 0);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.score-ring-inner{width:52px;height:52px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;flex-direction:column}
.score-ring-inner .score-num{font-size:18px;font-weight:800}
.score-ring-inner .score-lbl{font-size:7px;font-weight:700;color:var(--accent);letter-spacing:.5px}
.score-ring-lg{width:80px;height:80px}
.score-ring-lg .score-ring-inner{width:66px;height:66px}
.score-ring-lg .score-ring-inner .score-num{font-size:22px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;animation:fadeUp .3s ease both}
.card:hover{border-color:#374151}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}

/* Signal cards */
.signal-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;animation:fadeUp .3s ease both}
.signal-card.buy{border-left:4px solid #10b981}
.signal-card.sell{border-left:4px solid var(--red)}
.signal-card.hold{border-left:4px solid var(--muted)}

/* Source pills */
.source-pill{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;display:inline-block;margin:2px}

/* Data rows */
.data-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:4px;font-size:12px;transition:border-color .15s}
.data-row:hover{border-color:#374151}

/* Insider badges */
.insider-badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px}
.badge-purchase{background:#10b98120;color:#10b981}
.badge-sale{background:#ef444420;color:var(--red)}
.badge-award{background:#3b82f620;color:var(--blue)}
.badge-exercise{background:#f59e0b20;color:var(--yellow)}

/* Deployer ratings */
.rating{padding:3px 10px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:1px}
.rating-S{background:#f59e0b20;color:var(--yellow);border:1px solid #f59e0b40}
.rating-A{background:#8b5cf620;color:var(--purple);border:1px solid #8b5cf640}
.rating-B{background:#3b82f620;color:var(--blue);border:1px solid #3b82f640}
.rating-C{background:#6b728020;color:#9ca3af;border:1px solid #6b728040}
.rating-D{background:#ef444420;color:var(--red);border:1px solid #ef444440}

/* Wallet leaderboard */
.wallet-row{display:flex;align-items:center;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;font-size:12px;gap:12px}
.wallet-row:hover{border-color:#374151}
.wallet-rank{font-size:16px;font-weight:700;color:var(--accent);width:30px;text-align:center;flex-shrink:0}
.wallet-info{flex:1;min-width:0}
.wallet-name{font-weight:600;font-size:13px}
.wallet-addr{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.wallet-stats{text-align:right;flex-shrink:0}
.wr-high{color:#10b981}.wr-med{color:var(--yellow)}.wr-low{color:var(--red)}

/* Deployer cards */
.deployer-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.deployer-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.deployer-stats{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap}
.token-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--card-hover);border-radius:6px;font-size:12px;margin-bottom:4px}
.token-row:hover{background:#1f2937}
.token-row.rugged{opacity:.7;border-left:2px solid var(--red)}

/* Misc badges */
.badge{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600}
.badge-pump{background:#8b5cf620;color:var(--purple)}
.badge-rug{background:#ef444420;color:var(--red)}
.badge-kol{background:#f59e0b20;color:var(--yellow)}
.badge-sm{background:#10b98120;color:#10b981}
.badge-new{background:#ef444420;color:var(--red);animation:glow 2s infinite}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.5}}

.empty{color:var(--muted);text-align:center;padding:40px;font-size:13px}
.login-gate{text-align:center;padding:60px 20px}
.login-gate h2{font-size:18px;margin-bottom:8px}
.login-gate p{color:var(--muted);font-size:13px;margin-bottom:20px}
.login-gate button{padding:10px 24px;background:var(--accent);color:var(--bg);border:none;border-radius:6px;font-weight:600;cursor:pointer}

/* Premium blur gate */
.premium-gate{position:relative;margin-top:4px}
.premium-gate-blur{filter:blur(8px);pointer-events:none;opacity:.4}
.premium-gate-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10}
.premium-gate-box{background:var(--card-hover);border:2px solid var(--accent);border-radius:12px;padding:24px 40px;text-align:center;box-shadow:0 0 60px rgba(0,217,163,.15)}

/* Overview layout */
.overview-grid{display:grid;grid-template-columns:1fr 340px;gap:16px;margin-bottom:16px}
.overview-data{display:flex;flex-direction:column;gap:12px}

/* Sweep/special tags */
.sweep-tag{font-size:9px;padding:2px 6px;background:#f59e0b20;color:var(--yellow);border-radius:3px;font-weight:600}

/* Responsive */
@media(max-width:900px){
  .overview-grid{grid-template-columns:1fr}
  .bot-banner{grid-template-columns:1fr}
}
@media(max-width:768px){
  .stats-row{flex-direction:column}
  .stat-card{min-width:auto}
  .wallet-row{flex-direction:column;gap:8px;align-items:flex-start}
  .wallet-stats{text-align:left}
  .section-nav{flex-direction:column}
  .section-btn{width:100%;text-align:center}
  .tabs{overflow-x:auto;flex-wrap:nowrap}
  .tab{white-space:nowrap}
  .bot-card-stats{flex-direction:column;gap:8px}
  .data-row{flex-direction:column;gap:6px;align-items:flex-start}
}
</style>
</head>
<body>
<div id="agio-nav"></div>
<script>window.AGIO_PAGE="trading";</script>
<script src="/nav.js"></script>

<div class="page">
  <h1><span class="live-dot"></span> Trading Intelligence</h1>
  <p class="subtitle">7 data sources. One signal. Built for agents and traders.</p>

  <!-- Search Bar -->
  <div class="search-wrap">
    <div class="search-box" id="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="token-search" class="search-input" placeholder="Search any token or stock -- BTC, ETH, SOL, PEPE, AAPL, NVDA..." onkeyup="if(event.key==='Enter')searchToken()">
      <button class="search-btn" onclick="searchToken()">Search</button>
      <button class="scan-btn" onclick="scanCurrentSection()" id="scan-all-btn">Scan All</button>
    </div>
  </div>
  <div id="alpha-result" style="display:none;margin-bottom:24px"></div>

  <!-- Section Nav -->
  <div class="section-nav">
    <button class="section-btn active" onclick="switchSection('crypto')">Crypto</button>
    <button class="section-btn" onclick="switchSection('stocks')">Stocks</button>
    <button class="section-btn" onclick="switchSection('memes')">Memecoins</button>
  </div>

  <div id="stats-row" class="stats-row"></div>
  <div id="tabs-container"></div>
  <div id="login-gate" class="login-gate" style="display:none">
    <h2>Sign in to access Trading Tools</h2>
    <p>Real-time smart money tracking, deployer alerts, and whale watching for registered agents.</p>
    <button onclick="toggleSignIn()">Sign In</button>
  </div>
  <div id="content"></div>
</div>

<script>
// ========================================================================
// AGIOTAGE TRADING INTELLIGENCE DASHBOARD
// ========================================================================

const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8000'
  : 'https://agio-protocol-production.up.railway.app';

let currentSection = 'crypto';
let currentTab = 'coin-overview';

// --- Auth helpers ---
function getSession() {
  return localStorage.getItem('agiotage_session') || localStorage.getItem('agiotage_token');
}

function authFetch(url, opts = {}) {
  const s = getSession();
  if (s) {
    opts.headers = { ...opts.headers, 'Authorization': 'Bearer ' + s };
  }
  return fetch(API + url, opts);
}

function isAuth() {
  return !!(getSession() && localStorage.getItem('agiotage_token'));
}

function checkAuth() {
  if (!isAuth()) {
    document.getElementById('login-gate').style.display = 'block';
    document.getElementById('content').innerHTML = '';
    return false;
  }
  document.getElementById('login-gate').style.display = 'none';
  return true;
}

// --- Formatting helpers ---
function fmt$(n) {
  if (n == null || isNaN(n)) return '--';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  if (n > 0) return '$' + n.toFixed(0);
  return '$0';
}

function shortAddr(a) { return a ? a.slice(0, 6) + '...' + a.slice(-4) : 'unknown'; }

function timeAgo(iso) {
  if (!iso) return '--';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function pctColor(v) { return v >= 0 ? '#10b981' : 'var(--red)'; }
function pctStr(v) { return v == null ? '--' : (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }

function scoreRingHTML(score, size) {
  const cls = size === 'lg' ? 'score-ring score-ring-lg' : 'score-ring';
  const color = score >= 60 ? 'var(--accent)' : score >= 40 ? 'var(--yellow)' : 'var(--red)';
  return `<div class="${cls}" style="--score:${score};background:conic-gradient(${color} calc(var(--score) * 1%), var(--border) 0)">
    <div class="score-ring-inner">
      <span class="score-num" style="color:${color}">${score}</span>
      <span class="score-lbl">AGIOTAGE</span>
    </div>
  </div>`;
}

function premiumGateHTML(count) {
  return `<div class="premium-gate">
    <div class="premium-gate-blur">
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:8px"></div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:8px"></div>
    </div>
    <div class="premium-gate-overlay">
      <div class="premium-gate-box">
        <div style="font-size:18px;font-weight:800;margin-bottom:6px;color:var(--text)">${count} more results</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Unlock all signals, smart money data, and whale flow</div>
        <button onclick="toggleSignIn()" style="padding:12px 32px;background:var(--accent);color:var(--bg);border:none;border-radius:8px;font-weight:800;cursor:pointer;font-size:14px">Sign In Free</button>
      </div>
    </div>
  </div>`;
}

function sourcePillHTML(source) {
  const map = {
    correlated: { c: 'var(--accent)', l: 'Correlated' },
    smart_money: { c: '#10b981', l: 'Smart Money' },
    whale_accumulation: { c: '#10b981', l: 'Whale Buy' },
    whale_sell_pressure: { c: 'var(--red)', l: 'Whale Sell' },
    social: { c: 'var(--purple)', l: 'Social' },
    lunarcrush: { c: 'var(--yellow)', l: 'LunarCrush' },
    deployer: { c: 'var(--yellow)', l: 'Deployer' },
    followed_wallets: { c: 'var(--yellow)', l: 'Followed' },
    deployer_S_tier: { c: 'var(--yellow)', l: 'S-Tier Deployer' },
    deployer_A_tier: { c: 'var(--purple)', l: 'A-Tier Deployer' },
    deployer_rated: { c: 'var(--blue)', l: 'Rated Deployer' },
    deployer_rug_warning: { c: 'var(--red)', l: 'Rug Warning' },
    insider_buying: { c: '#10b981', l: 'Insider Buying' },
    insider_selling: { c: 'var(--red)', l: 'Insider Selling' },
  };
  const m = map[source] || { c: 'var(--muted)', l: source };
  return `<span class="source-pill" style="background:${m.c}20;color:${m.c}">${m.l}</span>`;
}

function insiderBadgeHTML(action) {
  const a = (action || '').toLowerCase();
  if (a.includes('purchase') || a.includes('buy')) return `<span class="insider-badge badge-purchase">P</span>`;
  if (a.includes('sale') || a.includes('sell')) return `<span class="insider-badge badge-sale">S</span>`;
  if (a.includes('award') || a.includes('grant')) return `<span class="insider-badge badge-award">A</span>`;
  if (a.includes('exercise')) return `<span class="insider-badge badge-exercise">E</span>`;
  return `<span class="insider-badge" style="background:var(--border);color:var(--muted)">${(action || '?').charAt(0).toUpperCase()}</span>`;
}

// ========================================================================
// TOKEN SEARCH (Agiotage Score)
// ========================================================================

async function searchToken() {
  const input = document.getElementById('token-search');
  const sym = input.value.trim().toUpperCase();
  if (!sym) return;
  const result = document.getElementById('alpha-result');
  result.style.display = 'block';
  result.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted)">Analyzing $' + sym + '...</div>';

  try {
    const d = await (await fetch(API + '/v1/alpha/' + sym)).json();
    const sigColor = d.signal === 'BUY' ? '#10b981' : d.signal === 'SELL' ? 'var(--red)' : 'var(--muted)';
    const confPct = d.confidence || 0;

    const sourceChips = (d.sources || []).map(s => sourcePillHTML(s)).join(' ');

    let detailRows = '';
    const det = d.details || {};

    if (det.smart_money) {
      detailRows += `<div style="padding:8px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between"><span style="color:#10b981;font-weight:600">Smart Money</span><span>${det.smart_money.wallets} wallets, ${fmt$(det.smart_money.total_usd)}, ${det.smart_money.strength}</span></div>`;
    }
    if (det.whale_flow) {
      const wf = det.whale_flow;
      detailRows += `<div style="padding:8px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between"><span style="color:${wf.direction === 'ACCUMULATION' ? '#10b981' : 'var(--red)'};font-weight:600">Whale Flow</span><span>${wf.direction} | In: ${fmt$(wf.deposits_usd)} | Out: ${fmt$(wf.withdrawals_usd)}</span></div>`;
    }
    if (det.social) {
      detailRows += `<div style="padding:8px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between"><span style="color:var(--purple);font-weight:600">Social</span><span>${det.social.mentions} mentions, ${det.social.platforms} platforms, Score: ${det.social.avg_sentiment_score}</span></div>`;
    }
    if (det.lunarcrush) {
      const lc = det.lunarcrush;
      detailRows += `<div style="padding:8px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between"><span style="color:var(--yellow);font-weight:600">LunarCrush</span><span>Galaxy: ${lc.galaxy_score} | AltRank: #${lc.alt_rank}${lc.percent_change_24h != null ? ' | 24h: ' + pctStr(lc.percent_change_24h) : ''}</span></div>`;
    }
    if (det.correlated) {
      detailRows += `<div style="padding:8px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between"><span style="color:var(--accent);font-weight:600">Correlated</span><span>Confidence: ${det.correlated.confidence} | ${det.correlated.source_count} sources</span></div>`;
    }
    if (det.security) {
      const sec = det.security;
      const safeColor = sec.safety_score >= 80 ? '#10b981' : sec.safety_score >= 50 ? 'var(--yellow)' : 'var(--red)';
      detailRows += `<div style="padding:10px 0;border-top:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-weight:700;font-size:13px">Security Audit</span>
          <span class="insider-badge" style="background:${safeColor}20;color:${safeColor}">${sec.safety_label} ${sec.safety_score}/100</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:11px">
          <span style="color:${sec.renounced_mint ? '#10b981' : 'var(--red)'}">Mint ${sec.renounced_mint ? 'renounced' : 'NOT renounced'}</span>
          <span style="color:${sec.renounced_freeze ? '#10b981' : 'var(--red)'}">Freeze ${sec.renounced_freeze ? 'renounced' : 'NOT renounced'}</span>

  } catch (e) {
    result.innerHTML = '<div style="text-align:center;padding:20px;color:var(--red)">Failed to analyze $' + sym + ': ' + e.message + '</div>';

}

function scanCurrentSection() {
  if (currentSection === 'crypto') scanMarket();
  else if (currentSection === 'memes') scanMemes();
  else if (currentSection === 'stocks') scanStockScores();
}

function switchSection(s) {
  currentSection = s;
  document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.section-btn').classList.add('active');
  renderSection();
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  loadTab();
}

const COINS_LIST = ['BTC','ETH','SOL','XRP','LINK','AVAX','DOT','ADA','ATOM','UNI','SUI','APT','SEI','INJ','TAO','NEAR','ARB','OP','DOGE','ZEC','MATIC','HBAR','FET','RNDR','BNB','PEPE','SHIB','BONK','WIF','FLOKI','LTC','ICP','FIL','AAVE','MKR','CRV','LDO','PENDLE','JUP','ONDO','KAS','ALGO','VET','THETA','SNX','GRT','SAND','MANA','AXS','CHZ'];

function renderSection() {
  const stats = document.getElementById('stats-row');
  const tabs = document.getElementById('tabs-container');

  if (currentSection === 'crypto') {
    currentTab = 'coin-overview';
    stats.innerHTML = '';
    tabs.innerHTML = `
      <div class="coin-selector" id="coin-selector">
        ${COINS_LIST.map(c => `<button class="coin-btn ${c === (window._selectedCoin || 'BTC') ? 'active' : ''}" id="coin-${c}" onclick="selectCoin('${c}')">${c}</button>`).join('')}
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('coin-overview')">Overview</button>
        <button class="tab" onclick="switchTab('momentum')">Momentum</button>
        <button class="tab" onclick="switchTab('whale-flow')">Whale Flow</button>
        <button class="tab" onclick="switchTab('social')">Social</button>
      </div>`;
    if (!window._selectedCoin) window._selectedCoin = 'BTC';
    loadTab();
  } else if (currentSection === 'stocks') {
    currentTab = 'stock-score-scan';
    stats.innerHTML = `
      <div class="stat-card"><div class="stat-val" id="sw-signals">--</div><div class="stat-label">Signals</div></div>
      <div class="stat-card"><div class="stat-val" id="sw-congress">--</div><div class="stat-label">Congress Trades</div></div>
      <div class="stat-card"><div class="stat-val" id="sw-insider">--</div><div class="stat-label">Insider Trades</div></div>
      <div class="stat-card"><div class="stat-val" id="sw-13f">--</div><div class="stat-label">13F Filings</div></div>`;
    tabs.innerHTML = `<div class="tabs">
      <button class="tab active" onclick="switchTab('stock-score-scan')">Score Scan</button>
      <button class="tab" onclick="switchTab('insider-trades')">Insider Trades</button>
      <button class="tab" onclick="switchTab('options-flow')">Options Flow</button>
      <button class="tab" onclick="switchTab('darkpool')">Dark Pool</button>
      <button class="tab" onclick="switchTab('uw-congress')">Congress</button>
    </div>`;
    loadStockStats();
    loadTab();
  } else if (currentSection === 'memes') {
    currentTab = 'meme-scan';
    stats.innerHTML = `
      <div class="stat-card"><div class="stat-val" id="s-clusters">--</div><div class="stat-label">Tokens Tracked</div></div>
      <div class="stat-card"><div class="stat-val" id="s-deployers">--</div><div class="stat-label">Top Deployers</div></div>
      <div class="stat-card"><div class="stat-val" id="s-signals">--</div><div class="stat-label">Signals Today</div></div>

    tabs.innerHTML = `<div class="tabs">
      <button class="tab active" onclick="switchTab('meme-scan')">Scan</button>
      <button class="tab" onclick="switchTab('signal-accuracy')">Signal Accuracy</button>
      <button class="tab" onclick="switchTab('deployers')">Deployers</button>
      <button class="tab" onclick="switchTab('leaderboard')">Smart Money</button>
      <button class="tab" onclick="switchTab('followed-wallets')">Followed Wallets</button>
    </div>`;
    loadMemeStats();
    loadTab();
  }
}

function loadTab() {
  const map = {
    'coin-overview': loadCoinOverview,
    'momentum': loadMomentum,
    'whale-flow': loadWhaleFlow,
    'social': loadSocialBuzz,
    'stock-score-scan': scanStockScores,
    'insider-trades': loadInsiderTrades,
    'options-flow': loadOptionsFlow,
    'darkpool': loadDarkPool,
    'uw-congress': loadUWCongress,
    'meme-scan': scanMemes,
    'signal-accuracy': loadSignalAccuracy,
    'deployers': loadDeployers,
    'leaderboard': loadLeaderboard,
    'followed-wallets': loadFollowedWallets,
  };
  const fn = map[currentTab];
  if (fn) fn();
}

function selectCoin(sym) {
  window._selectedCoin = sym;
  document.querySelectorAll('.coin-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('coin-' + sym);
  if (btn) btn.classList.add('active');
  if (currentTab === 'coin-overview') loadCoinOverview();
}

async function loadCoinOverview() {
  const coin = window._selectedCoin || 'BTC';
  const content = document.getElementById('content');

  // Only rebuild chart if coin changed
  if (_currentChartCoin !== coin) {
    _currentChartCoin = coin;
    const tvSymbol = COIN_TV[coin] || 'BINANCE:BTCUSDT';
    content.innerHTML = `<div class="overview-grid">
      <div>
        <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden">

    const widgetDiv = document.getElementById('tv-chart-widget');
    const script = document.createElement('script');
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    script.type = 'text/javascript';
    script.async = true;
    script.textContent = JSON.stringify({
      symbol: tvSymbol, interval: '60', timezone: 'Etc/UTC', theme: 'dark', style: '1', locale: 'en',

// MEMECOINS - SIGNAL ACCURACY
// ========================================================================
async function loadSignalAccuracy() {
  if (!checkAuth()) return;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty">Loading signal accuracy...</div>';

  try {
    const d = await (await authFetch('/v1/smart-money/signal-audit')).json();
    if (d.detail) { document.getElementById('login-gate').style.display = 'block'; return; }

    const signals = d.signals || d.audits || [];
    const stats = d.stats || {};

    let html = '';

    // Win/loss/neutral summary — use top-level fields from signal-audit response
    const wins = d.wins || 0;
    const losses = d.losses || 0;
    const neutral = d.neutral || 0;
    const total = d.total_audited || (wins + losses + neutral);
    const wr = d.win_rate || (total > 0 ? ((wins / total) * 100).toFixed(1) : '0');
    if (total > 0) {
      html += `<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <div class="stat-card" style="border-left:3px solid #10b981"><div class="stat-val" style="color:#10b981">${wins}</div><div class="stat-label">Wins</div></div>
        <div class="stat-card" style="border-left:3px solid var(--red)"><div class="stat-val" style="color:var(--red)">${losses}</div><div class="stat-label">Losses</div></div>
        <div class="stat-card" style="border-left:3px solid var(--muted)"><div class="stat-val" style="color:var(--muted)">${neutral}</div><div class="stat-label">Neutral</div></div>
        <div class="stat-card" style="border-left:3px solid var(--accent)"><div class="stat-val">${wr}%</div><div class="stat-label">Win Rate</div></div>
      </div>`;
    }

    if (signals.length) {
      html += '<div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px">SIGNAL AUDIT -- Historical Performance</div>';
      html += signals.map((s, i) => {
        const priceAtSignal = s.signal_price || s.price_at_signal || 0;
        const currentPrice = s.current_price || s.price_now || 0;
        const change = s.pct_change || (priceAtSignal > 0 ? ((currentPrice - priceAtSignal) / priceAtSignal * 100) : 0);
        const outcome = s.outcome || (change > 10 ? 'WIN' : change < -10 ? 'LOSS' : 'NEUTRAL');
        const oc = outcome === 'WIN' || outcome === 'BIG_WIN' ? '#10b981' : outcome === 'LOSS' || outcome === 'BIG_LOSS' ? 'var(--red)' : 'var(--muted)';
        const mcSignal = s.mc_at_signal || 0;
        const mcCurrent = s.current_mc || 0;
        const mcHighest = s.highest_mc || 0;
        const mcMult = s.mc_multiple || (mcSignal > 0 && mcHighest > 0 ? (mcHighest / mcSignal).toFixed(1) : null);
        const strength = s.strength || s.signal_strength || '';
        const wallets = s.wallets || s.wallet_count || '';

        return `<div class="data-row" style="border-left:3px solid ${oc};animation:fadeUp .3s ease both;animation-delay:${i * 0.02}s;padding:12px 16px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-size:15px;font-weight:800">\$${s.token || s.symbol || '?'}</span>
              ${strength ? '<span style="padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;background:#1f2937;color:var(--muted)">' + strength + '</span>' : ''}
              ${wallets ? '<span style="font-size:10px;color:var(--muted)">' + wallets + ' wallets</span>' : ''}
              <span style="padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;background:${oc}20;color:${oc}">${outcome}</span>
            </div>
            <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px">
              <div><span style="color:var(--muted)">Signal MC:</span> <span style="font-weight:600">${mcSignal > 0 ? fmt$(mcSignal) : 'N/A'}</span></div>
              <div><span style="color:var(--muted)">Current MC:</span> <span style="font-weight:600;color:${mcCurrent > mcSignal ? '#10b981' : 'var(--red)'}">${mcCurrent > 0 ? fmt$(mcCurrent) : 'N/A'}</span></div>
              <div><span style="color:var(--muted)">Highest MC:</span> <span style="font-weight:600;color:#f59e0b">${mcHighest > 0 ? fmt$(mcHighest) : 'N/A'}</span></div>
              ${mcMult ? '<div><span style="color:var(--muted)">Peak:</span> <span style="font-weight:700;color:#f59e0b">' + mcMult + 'x</span></div>' : ''}
            </div>
            <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:10px;color:var(--muted);margin-top:4px">
              <span>Signal: $${priceAtSignal > 0 ? priceAtSignal.toFixed(6) : 'N/A'}</span>
              <span>Now: $${currentPrice > 0 ? currentPrice.toFixed(6) : 'N/A'}</span>
              <span style="font-weight:700;color:${pctColor(change)}">${pctStr(change)}</span>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <span style="font-size:10px;color:var(--muted)">${timeAgo(s.detected_at || s.signal_time || s.created_at)}</span>
          </div>
        </div>`;
      }).join('');
    } else if (!stats.total) {
      html += '<div class="empty">No signal audit data yet. Signals are tracked for accuracy once they fire.</div>';
    }

    content.innerHTML = html;
  } catch (e) {
    content.innerHTML = '<div class="empty">Failed to load signal accuracy: ' + e.message + '</div>';
  }
}

          </div>
          <div class="wallet-stats">
            <div style="font-size:16px;font-weight:700" class="${wrClass}">${(w.winrate * 100).toFixed(0)}%</div>
            <div style="font-size:12px;color:var(--muted)">${fmt$(w.realized_profit)} profit</div>
            <div style="font-size:10px;color:var(--muted)">${w.tokens_traded} tokens | ${w.pnl_2x_plus} 2x+ | ${w.pnl_5x_plus} 5x+</div>
          </div>
        </div>`;
      }).join('');
  } catch (e) {
    content.innerHTML = '<div class="empty">Failed to load leaderboard: ' + e.message + '</div>';
  }
}

// ========================================================================
// MEMECOINS - FOLLOWED WALLETS
// ========================================================================
async function loadFollowedWallets() {
  if (!checkAuth()) return;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty">Loading followed wallets...</div>';

  try {
    const [sigResp, lbResp] = await Promise.all([
      authFetch('/v1/wallet-follow/signals?limit=20').then(r => r.json()).catch(() => ({ signals: [] })),
      authFetch('/v1/wallet-follow/leaderboard?limit=20').then(r => r.json()).catch(() => ({ wallets: [] })),
    ]);

    if (sigResp.detail || lbResp.detail) { document.getElementById('login-gate').style.display = 'block'; return; }

    let html = '';
    const signals = sigResp.signals || [];
    const wallets = lbResp.wallets || lbResp.leaderboard || [];

    // Signals from followed wallets
    if (signals.length) {
      html += '<div style="font-size:13px;font-weight:700;color:var(--yellow);margin-bottom:12px">FOLLOWED WALLET SIGNALS</div>';
      html += signals.map((s, i) => {
        const sigColor = s.signal === 'BUY' || s.side === 'buy' ? '#10b981' : 'var(--red)';
        const strengthColors = { VERY_STRONG: 'var(--accent)', STRONG: 'var(--yellow)', MEDIUM: 'var(--blue)' };
        const sc = strengthColors[s.strength] || 'var(--blue)';
        return `<div class="signal-card" style="border-left:4px solid ${sigColor};animation-delay:${i * 0.03}s">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:16px;font-weight:800">${s.token_symbol || s.symbol || '?'}</span>
              ${s.strength ? '<span style="padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;background:' + sc + '20;color:' + sc + '">' + s.strength.replace(/_/g, ' ') + '</span>' : ''}
            </div>
            <div style="text-align:right">
              ${s.total_usd ? '<span style="font-weight:700;color:var(--accent)">' + fmt$(s.total_usd) + '</span>' : ''}
              <span style="font-size:10px;color:var(--muted);margin-left:6px">${s.wallet_count || 0} wallets</span>
            </div>
          </div>
          ${s.token_address ? '<div style="display:flex;gap:6px;align-items:center;margin-top:6px"><span style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + s.token_address + '</span><button onclick="navigator.clipboard.writeText(\'' + s.token_address + '\');this.textContent=\'Copied!\';setTimeout(()=>this.textContent=\'Copy CA\',1500)" style="padding:4px 10px;background:#1f2937;border:1px solid #374151;color:var(--accent);border-radius:4px;font-size:10px;cursor:pointer;font-weight:600;white-space:nowrap">Copy CA</button></div>' : ''}
        </div>`;
      }).join('');
    }

    // Followed wallet leaderboard
    if (wallets.length) {
      html += '<div style="font-size:13px;font-weight:700;color:var(--muted);margin:20px 0 12px">FOLLOWED WALLET LEADERBOARD</div>';
      html += wallets.map((w, i) => {
        const wrVal = w.winrate || w.win_rate || 0;
        const wrClass = wrVal >= 0.65 ? 'wr-high' : wrVal >= 0.45 ? 'wr-med' : 'wr-low';
        return `<div class="wallet-row">
          <div class="wallet-rank">#${i + 1}</div>
          <div class="wallet-info">
            <div class="wallet-name">${w.name || w.label || shortAddr(w.wallet || w.address)}</div>
            <div class="wallet-addr"><a href="https://solscan.io/account/${w.wallet || w.address}" target="_blank">${shortAddr(w.wallet || w.address)}</a></div>
          </div>
          <div class="wallet-stats">
            <div style="font-size:16px;font-weight:700" class="${wrClass}">${(wrVal * 100).toFixed(0)}%</div>
            <div style="font-size:12px;color:var(--muted)">${fmt$(w.realized_profit || w.profit || 0)} profit</div>
            <div style="font-size:10px;color:var(--muted)">${w.trades || w.tokens_traded || 0} trades</div>
          </div>
        </div>`;
      }).join('');
    }

    if (!signals.length && !wallets.length) {
      html = '<div class="empty">No followed wallet data yet. Follow wallets to track their trades and get signals when they move.</div>';
    }

    content.innerHTML = html;
  } catch (e) {
    content.innerHTML = '<div class="empty">Failed to load followed wallets: ' + e.message + '</div>';
  }
}

// ========================================================================
// MEMECOINS - STATS
// ========================================================================
async function loadMemeStats() {
  try {
    const [sm, mt, audit] = await Promise.all([
      fetch(API + '/v1/smart-money/stats').then(r => r.json()).catch(() => ({})),
      fetch(API + '/v1/meme-tracker/stats').then(r => r.json()).catch(() => ({})),
      fetch(API + '/v1/smart-money/signal-audit').then(r => r.json()).catch(() => ({})),
    ]);
    document.getElementById('s-clusters').textContent = mt.total_tokens_tracked || sm.tokens_tracked || 0;
    document.getElementById('s-deployers').textContent = mt.top_deployers || 0;
    document.getElementById('s-signals').textContent = sm.cluster_signals || sm.signals_today || 0;
    const auditStats = audit.stats || {};
    const total = auditStats.total || 0;
    const wins = auditStats.wins || 0;
    document.getElementById('s-accuracy').textContent = total > 0 ? ((wins / total) * 100).toFixed(0) + '%' : '--';
  } catch (e) {
    // Graceful fallback
  }
}

// ========================================================================
// INITIALIZATION + AUTO-REFRESH
// ========================================================================
document.addEventListener('DOMContentLoaded', () => {
  renderSection();

  // Auto-refresh every 30 seconds for active tab only
  setInterval(() => {
    if (currentSection === 'memes') {
      loadMemeStats();
      loadTab();
    } else if (currentSection === 'crypto' && currentTab !== 'coin-overview') {
      loadTab();
    } else if (currentSection === 'stocks') {
      loadStockStats();
      if (currentTab !== 'stock-score-scan') {
        loadTab();
      }
    }
  }, 30000);
});
</script>
