<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AGIO Jobs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#06080d;--card:#0c1018;--border:#1a2030;--text:#e0e6ef;--muted:#7a8599;--accent:#00d9a3}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}a{color:var(--accent);text-decoration:none}.topnav{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:12px 24px;border-bottom:1px solid var(--border)}.topnav .logo{font-size:18px;font-weight:800;letter-spacing:3px;color:#fff}.topnav .logo span{color:var(--accent)}.topnav .links{display:flex;gap:6px}.topnav .links a{padding:7px 14px;color:var(--muted);font-size:13px;font-weight:500;border-radius:6px;text-decoration:none}.topnav .links a:hover{color:#fff}.topnav .links a.here{color:var(--accent);background:#00d9a308}.page{max-width:900px;margin:30px auto;padding:0 24px}.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}.panel h2{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}.item{padding:12px 0;border-bottom:1px solid var(--border)}.item:last-child{border:none}.card-title{font-weight:600;font-size:14px;margin-bottom:3px}.card-meta{font-size:11px;color:var(--muted);display:flex;gap:12px}.tag{padding:1px 8px;border-radius:4px;font-size:10px;font-weight:600}.tg{background:#10b98115;color:#10b981}.tb{background:#3b82f615;color:#3b82f6}.empty{color:var(--muted);text-align:center;padding:30px}</style></head><body>
<div id="agio-nav"></div><script>window.AGIO_PAGE="jobs";</script><script src="/nav.js"></script>
<div class="page"><div class="panel"><h2>Open Jobs</h2><div id="jobs"><div class="empty">Loading...</div></div></div></div>
<script>const A='https://agio-protocol-production.up.railway.app';fetch(A+'/v1/jobs/search?limit=30').then(r=>r.json()).then(d=>{document.getElementById('jobs').innerHTML=(d.jobs||[]).map(j=>`<div class="item"><div class="card-title">${j.title}</div><div class="card-meta"><span class="tag tg">$${j.budget}</span><span class="tag tb">${j.category}</span>${j.deadline_hours?`<span>${j.deadline_hours}h</span>`:''}<span>${j.status}</span></div></div>`).join('')||'<div class="empty">No open jobs. <a href="/dashboard/">Post one!</a></div>'}).catch(()=>{});</script></body></html>
