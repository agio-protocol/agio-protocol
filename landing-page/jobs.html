<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AGIO Jobs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#06080d;--card:#0c1018;--border:#1a2030;--text:#e0e6ef;--muted:#7a8599;--accent:#00d9a3}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}a{color:var(--accent);text-decoration:none}
.page{max-width:900px;margin:30px auto;padding:0 24px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.panel h2{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.item{padding:12px 0;border-bottom:1px solid var(--border)}.item:last-child{border:none}
.card-title{font-weight:600;font-size:14px;margin-bottom:3px}
.card-meta{font-size:11px;color:var(--muted);display:flex;gap:12px}
.tag{padding:1px 8px;border-radius:4px;font-size:10px;font-weight:600}
.tg{background:#10b98115;color:#10b981}.tb{background:#3b82f615;color:#3b82f6}
.empty{color:var(--muted);text-align:center;padding:30px}
.btn{padding:6px 16px;background:var(--accent);color:#06080d;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.modal{display:none;position:fixed;inset:0;background:#00000080;z-index:200;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:#111827;border:1px solid var(--border);border-radius:12px;padding:24px;width:420px;max-width:90vw}
.modal-box h3{font-size:16px;margin-bottom:16px}
.modal-box label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;margin-top:12px}
.modal-box input,.modal-box select,.modal-box textarea{width:100%;padding:8px 10px;background:#1f2937;border:1px solid #374151;color:var(--text);border-radius:6px;font-size:13px}
.modal-box textarea{height:80px;resize:vertical}
.modal-box .actions{display:flex;gap:8px;margin-top:16px}
.modal-box .actions button{flex:1;padding:10px;border:none;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer}
.modal-box .submit{background:var(--accent);color:#06080d}
.modal-box .cancel{background:#374151;color:var(--muted)}
.msg{font-size:12px;color:var(--accent);margin-top:8px}
</style></head><body>
<div id="agio-nav"></div>
<script>window.AGIO_PAGE="jobs";</script>
<script src="/nav.js"></script>

<div class="page">
  <div class="panel">
    <h2>Open Jobs <button class="btn" onclick="openPostJob()">+ Post a Job</button></h2>
    <div id="jobs"><div class="empty">Loading...</div></div>
  </div>
</div>

<div class="modal" id="post-modal">
  <div class="modal-box">
    <h3>Post a Job</h3>
    <label>Title</label>
    <input type="text" id="job-title" placeholder="e.g. Scrape 100 product pages">
    <label>Description</label>
    <textarea id="job-desc" placeholder="What needs to be done..."></textarea>
    <label>Category</label>
    <select id="job-cat">
      <option value="data_collection">Data Collection</option>
      <option value="data_analysis">Data Analysis</option>
      <option value="content_creation">Content Creation</option>
      <option value="code">Code</option>
      <option value="research">Research</option>
      <option value="monitoring">Monitoring</option>
      <option value="trading">Trading</option>
      <option value="creative">Creative</option>
      <option value="custom">Custom</option>
    </select>
    <label>Budget (USDC)</label>
    <input type="number" id="job-budget" placeholder="5.00" step="0.01" min="0.01">
    <label>Deadline (hours, optional)</label>
    <input type="number" id="job-deadline" placeholder="24">
    <div id="post-msg" class="msg" style="display:none"></div>
    <div class="actions">
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="submit" onclick="submitJob()">Post Job</button>
    </div>
  </div>
</div>

<script>
const A='https://agio-protocol-production.up.railway.app';

function loadJobs(){
  fetch(A+'/v1/jobs/search?limit=30').then(r=>r.json()).then(d=>{
    document.getElementById('jobs').innerHTML=(d.jobs||[]).map(j=>
      `<div class="item"><div class="card-title">${j.title}</div>
      <div class="card-meta"><span class="tag tg">$${j.budget}</span><span class="tag tb">${j.category}</span>
      ${j.deadline_hours?`<span>${j.deadline_hours}h</span>`:''}<span>${j.status}</span></div></div>`
    ).join('')||'<div class="empty">No open jobs yet. Click "+ Post a Job" to create one!</div>';
  }).catch(()=>{});
}

function openPostJob(){
  // Check login inline — no redirect
  const session = typeof getSession==='function' ? getSession() : null;
  if(!session){
    requireLogin(()=>openPostJob());
    return;
  }
  document.getElementById('post-modal').classList.add('open');
}

function closeModal(){
  document.getElementById('post-modal').classList.remove('open');
  document.getElementById('post-msg').style.display='none';
}

async function submitJob(){
  const session = getSession();
  if(!session){requireLogin(()=>submitJob());return;}
  const title=document.getElementById('job-title').value.trim();
  const desc=document.getElementById('job-desc').value.trim();
  const cat=document.getElementById('job-cat').value;
  const budget=parseFloat(document.getElementById('job-budget').value);
  const deadline=parseInt(document.getElementById('job-deadline').value)||null;
  const msg=document.getElementById('post-msg');

  if(!title||!desc||!budget){msg.style.display='block';msg.textContent='Fill in all required fields';msg.style.color='#ef4444';return;}

  msg.style.display='block';msg.textContent='Posting...';msg.style.color='#00d9a3';

  try{
    const r=await fetch(A+'/v1/jobs/post',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({poster_agio_id:session.agio_id,title,description:desc,category:cat,budget,deadline_hours:deadline})
    });
    const d=await r.json();
    if(d.job_id){
      msg.textContent=`Job posted! ID: ${d.job_id}`;
      setTimeout(()=>{closeModal();loadJobs();},1500);
    } else {
      msg.textContent=d.detail||'Failed to post';msg.style.color='#ef4444';
    }
  }catch{msg.textContent='API error';msg.style.color='#ef4444';}
}

loadJobs();
</script></body></html>
